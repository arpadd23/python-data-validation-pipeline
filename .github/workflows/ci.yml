name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install ruff
      - run: ruff check src tests examples

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.13"]
        include:
          - os: ubuntu-latest
            python-version: "3.11"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -v

  smoke:
    # Run the README quickstart end-to-end against the bundled sample data.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e .
      - name: audit
        run: recpipe audit --input examples/sample_data --marker "PokerStars Hand #"
      - name: reduce
        run: >
          recpipe reduce --input examples/sample_data --output /tmp/reduced
          --divisor 5 --marker "PokerStars Hand #" --apply --report /tmp/reduce_report.csv
      - name: transform
        run: >
          recpipe transform --input /tmp/reduced --output /tmp/anonymized
          --rules examples/rules/anonymize.json --marker "PokerStars Hand #" --apply
      - name: validate reduce
        run: >
          recpipe validate --input examples/sample_data --output /tmp/reduced
          --divisor 5 --marker "PokerStars Hand #"
      - name: validate transform
        run: >
          recpipe validate --input /tmp/reduced --output /tmp/anonymized
          --marker "PokerStars Hand #"

name: Bug report
description: Something recpipe does wrong — mismatched counts, crashes, wrong output.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! The most useful thing you can provide is a **tiny
        synthetic reproduction** — a few small made-up files plus the exact command.
        Please never attach real or client data.
  - type: input
    id: version
    attributes:
      label: recpipe version
      description: Output of `recpipe --version`
      placeholder: recpipe 0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and Python version
      placeholder: Windows 11 / Python 3.11
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command and output
      description: The full command line you ran and what it printed.
      render: shell
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction data
      description: |
        Smallest synthetic input that shows the problem (file layout + a couple of
        records). Synthetic data only.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true
